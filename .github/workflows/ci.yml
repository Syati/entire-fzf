name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Check syntax
        run: zsh -n entire-zsh.plugin.zsh

      - name: Check exported functions
        run: |
          zsh -fc '
            source ./entire-zsh.plugin.zsh
            whence -w es esd esr
          ' | tee /tmp/functions.txt
          grep -qx "es: function" /tmp/functions.txt
          grep -qx "esd: function" /tmp/functions.txt
          grep -qx "esr: function" /tmp/functions.txt
